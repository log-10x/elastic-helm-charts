{{- if .Values.daemonset.enabled }}
{{- $tenxGitInit := and .Values.tenx.enabled (or .Values.tenx.config.git.enabled .Values.tenx.symbols.git.enabled) -}}
{{- $tenxVolumeInit := and .Values.tenx.enabled (or .Values.tenx.config.volume.enabled .Values.tenx.symbols.volume.enabled) -}}
{{- $defaultTag := printf "%s-%s" (.Chart.AppVersion) (.Values.tenx.variant) -}}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ template "filebeat.fullname" . }}
  labels:
    app: "{{ template "filebeat.fullname" . }}"
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service | quote }}
    release: {{ .Release.Name | quote }}
    {{- if .Values.daemonset.labels }}
    {{- range $key, $value := .Values.daemonset.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- else }}
    {{- range $key, $value := .Values.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
  {{- if .Values.daemonset.annotations }}
  annotations:
    {{- range $key, $value := .Values.daemonset.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app: "{{ template "filebeat.fullname" . }}"
      release: {{ .Release.Name | quote }}
  updateStrategy:
    {{- if eq .Values.updateStrategy "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.daemonset.maxUnavailable }}
    {{- end }}
    type: {{ .Values.updateStrategy }}
  template:
    metadata:
      annotations:
        {{- range $key, $value := .Values.podAnnotations }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{/* This forces a restart if the configmap has changed */}}
        {{- if or  .Values.filebeatConfig .Values.daemonset.filebeatConfig }}
        configChecksum: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum | trunc 63 }}
        {{- end }}
      name: "{{ template "filebeat.fullname" . }}"
      labels:
        app: "{{ template "filebeat.fullname" . }}"
        chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
        heritage: {{ .Release.Service | quote }}
        release: {{ .Release.Name | quote }}
        {{- if .Values.daemonset.labels }}
        {{- range $key, $value := .Values.daemonset.labels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{- else }}
        {{- range $key, $value := .Values.labels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{- end }}
    spec:
      tolerations: {{ toYaml ( .Values.tolerations | default .Values.daemonset.tolerations ) | nindent 8 }}
      nodeSelector: {{ toYaml ( .Values.nodeSelector | default .Values.daemonset.nodeSelector ) | nindent 8 }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName  }}
      {{- end }}
      affinity: {{ toYaml ( .Values.affinity | default .Values.daemonset.affinity ) | nindent 8 }}
      serviceAccountName: {{ template "filebeat.serviceAccount" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriod }}
      {{- if .Values.daemonset.hostNetworking }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig: {{ toYaml .Values.dnsConfig | nindent 8 }}
      {{- end }}
      {{- if .Values.hostAliases | default .Values.daemonset.hostAliases }}
      hostAliases: {{ toYaml ( .Values.hostAliases | default .Values.daemonset.hostAliases ) | nindent 8 }}
      {{- end }}
      volumes:
      {{- $secretMounts := .Values.secretMounts | default .Values.daemonset.secretMounts }}
      {{- if and $secretMounts (kindIs "slice" $secretMounts) }}
      {{- range $secretMounts }}
      - name: {{ .name }}
        secret:
          secretName: {{ .secretName }}
      {{- end }}
      {{- end }}
      {{- if .Values.filebeatConfig }}
      - name: filebeat-config
        configMap:
          defaultMode: 0600
          name: {{ template "filebeat.fullname" . }}-config
      {{- else if .Values.daemonset.filebeatConfig }}
      - name: filebeat-config
        configMap:
          defaultMode: 0600
          name: {{ template "filebeat.fullname" . }}-daemonset-config
      {{- end }}
      - name: data
        hostPath:
          path: {{ .Values.hostPathRoot }}/{{ template "filebeat.fullname" . }}-{{ .Release.Namespace }}-data
          type: DirectoryOrCreate
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: varlog
        hostPath:
          path: /var/log
      - name: varrundockersock
        hostPath:
          path: /var/run/docker.sock
    {{- if $tenxGitInit }}
      - name: tenx-git
        emptyDir: {}
    {{- end }}
    {{- if and .Values.tenx.enabled .Values.tenx.config.volume.enabled }}
      - name: tenx-config-volume
        persistentVolumeClaim:
          claimName: {{ .Values.tenx.config.volume.claimName }}
    {{- end }}
    {{- if and .Values.tenx.enabled .Values.tenx.symbols.volume.enabled }}
      - name: tenx-symbols-volume
        persistentVolumeClaim:
          claimName: {{ .Values.tenx.symbols.volume.claimName }}
    {{- end }}
      {{- if .Values.extraVolumes | default .Values.daemonset.extraVolumes }}
{{ toYaml ( .Values.extraVolumes | default .Values.daemonset.extraVolumes )  | indent 6 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      {{- if or (.Values.extraInitContainers) $tenxGitInit }}
      initContainers:
        {{- if $tenxGitInit }}
        - name: tenx-git-config
          image: "{{ .Values.tenx.configFetcherImage.repository }}:{{ .Values.tenx.configFetcherImage.tag }}"
          imagePullPolicy: "{{ .Values.tenx.configFetcherImage.pullPolicy }}"
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ template "filebeat.fullname" . }}-tenx-git-token
                  key: token
          args:
            {{- if .Values.tenx.config.git.enabled }}
            - "--config-repo"
            - {{ .Values.tenx.config.git.url | quote }}
            {{- if .Values.tenx.config.git.branch }}
            - "--config-branch"
            - {{ .Values.tenx.config.git.branch | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.tenx.symbols.git.enabled }}
            - "--symbols-repo"
            - {{ .Values.tenx.symbols.git.url | quote }}
            {{- if .Values.tenx.symbols.git.branch }}
            - "--symbols-branch"
            - {{ .Values.tenx.symbols.git.branch | quote }}
            {{- end }}
            {{- if .Values.tenx.symbols.git.path }}
            - "--symbols-path"
            - {{ .Values.tenx.symbols.git.path | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: tenx-git
              mountPath: /data
        {{- end }}
      {{- if .Values.extraInitContainers }}
      # All the other beats accept a string here while
      # filebeat accepts a valid yaml array. We're keeping
      # this as a backwards compatible change, while adding
      # also a way to pass a string as other templates to
      # make these implementations consistent.
      # https://github.com/elastic/helm-charts/issues/490
      {{- if eq "string" (printf "%T" .Values.extraInitContainers) }}
{{ tpl .Values.extraInitContainers . | indent 8 }}
      {{- else }}
{{ toYaml .Values.extraInitContainers | indent 8 }}
      {{- end }}
      {{- end }}
      {{- end }}
      containers:
      - name: "{{ .Chart.Name }}"
        {{- if .Values.tenx.debug }}
        image: "{{ .Values.image }}:{{ .Values.imageTag | default $defaultTag }}-debug"
        {{- else}}
        image: "{{ .Values.image }}:{{ .Values.imageTag | default $defaultTag }}"
        {{- end }}
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        args:
        - "-e"
        - "-E"
        - "http.enabled=true"
        {{- if .Values.tenx.debug }}
        - "-d"
        - "\"*\""
        {{- end }}
        livenessProbe:
{{ toYaml .Values.livenessProbe | indent 10 }}
        readinessProbe:
{{ toYaml .Values.readinessProbe | indent 10 }}
        resources:
{{ toYaml ( .Values.resources | default .Values.daemonset.resources )  | indent 10 }}
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: TENX_LOG_PATH
          value: /etc/tenx/log/
        {{- if .Values.tenx.enabled }}
        - name: TENX_API_KEY
        {{- if .Values.tenx.apiKey }}
          valueFrom:
            secretKeyRef:
              name: {{ template "filebeat.fullname" . }}-tenx-api-key
              key: api-key
        {{- else }}
          value: ""
        {{- end }}
        {{- if .Values.tenx.runtimeName }}
        - name: TENX_RUNTIME_NAME
          value: {{ .Values.tenx.runtimeName | quote }}
        {{- end }}
        {{- if .Values.tenx.config.git.enabled }}
        - name: TENX_CONFIG
          value: "/etc/tenx/git/config"
        {{- else if .Values.tenx.config.volume.enabled }}
        - name: TENX_CONFIG
          value: "/etc/tenx/config"
        {{- end }}
        {{- if .Values.tenx.symbols.git.enabled }}
        - name: TENX_SYMBOLS_PATH
          value: "/etc/tenx/git/config/data/shared/symbols"
        {{- else if .Values.tenx.symbols.volume.enabled }}
        - name: TENX_SYMBOLS_PATH
          value: "/etc/tenx/symbols"
        {{- end }}
        - name: TENX_RUN_ARGS
        {{- /*
            App paths were flattened in the config repo's doc refactor:
              apps/edge/reporter   → apps/reporter
              apps/edge/regulator  → apps/regulator
              apps/edge/optimizer  → apps/compiler
            Keep the run/input/forwarder/... paths unchanged — those
            are still per-forwarder subdirs and do not move.
        */}}
        {{- if eq $.Values.tenx.kind "optimize" }}
          value: "@run/input/forwarder/filebeat/optimize/config.yaml @apps/compiler"
        {{- else if eq $.Values.tenx.kind "regulate" }}
          value: "@run/input/forwarder/filebeat/regulate/config.yaml @apps/regulator"
        {{- else if eq $.Values.tenx.kind "report" }}
          value: "@run/input/forwarder/filebeat/report/config.yaml @apps/reporter"
        {{- end }}
        {{- end }}
{{- if .Values.extraEnvs | default .Values.daemonset.extraEnvs }}
{{ toYaml ( .Values.extraEnvs | default .Values.daemonset.extraEnvs ) | indent 8 }}
{{- end }}
        envFrom: {{ toYaml ( .Values.envFrom | default .Values.daemonset.envFrom ) | nindent 10 }}
        securityContext: {{ toYaml ( .Values.podSecurityContext | default .Values.daemonset.securityContext ) | nindent 10 }}
        volumeMounts:
        {{- $secretMountsVol := .Values.secretMounts | default .Values.daemonset.secretMounts }}
        {{- if and $secretMountsVol (kindIs "slice" $secretMountsVol) }}
        {{- range $secretMountsVol }}
        - name: {{ .name }}
          mountPath: {{ .path }}
          {{- if .subPath }}
          subPath: {{ .subPath }}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- range $path, $config := .Values.filebeatConfig }}
        - name: filebeat-config
          mountPath: /usr/share/filebeat/{{ $path }}
          readOnly: true
          subPath: {{ $path }}
        {{ else }}
        {{- range $path, $config := .Values.daemonset.filebeatConfig }}
        - name: filebeat-config
          mountPath: /usr/share/filebeat/{{ $path }}
          readOnly: true
          subPath: {{ $path }}
        {{- end }}
        {{- end }}
        - name: data
          mountPath: /usr/share/filebeat/data
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: varlog
          mountPath: /var/log
          readOnly: true
        # Necessary when using autodiscovery; avoid mounting it otherwise
        # See: https://www.elastic.co/guide/en/beats/filebeat/master/configuration-autodiscover.html
        - name: varrundockersock
          mountPath: /var/run/docker.sock
          readOnly: true
      {{- if $tenxGitInit }}
        - name: tenx-git
          mountPath: /etc/tenx/git
      {{- end }}
      {{- if and .Values.tenx.enabled .Values.tenx.config.volume.enabled }}
        - name: tenx-config-volume
          mountPath: /etc/tenx/config
      {{- end }}
      {{- if and .Values.tenx.enabled .Values.tenx.symbols.volume.enabled }}
        - name: tenx-symbols-volume
          mountPath: /etc/tenx/symbols
      {{- end }}
        {{- if .Values.extraVolumeMounts | default .Values.daemonset.extraVolumeMounts }}
{{ toYaml (.Values.extraVolumeMounts | default .Values.daemonset.extraVolumeMounts ) | indent 8 }}
        {{- end }}
      {{- if .Values.extraContainers }}
{{ tpl .Values.extraContainers . | indent 6 }}
      {{- end }}
{{- end }}
