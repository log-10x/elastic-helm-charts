{{- if and .Values.tenx.enabled .Values.tenx.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "logstash.fullname" . }}-tenx-api-key
  labels:
    app: {{ template "logstash.fullname" . }}
    chart: {{ .Chart.Name | quote }}
    heritage: {{ .Release.Service | quote }}
    release: {{ .Release.Name | quote }}
type: Opaque
data:
  api-key: {{ .Values.tenx.apiKey | b64enc | quote }}
{{- end }}
{{- if and .Values.tenx.enabled .Values.tenx.gitToken }}
{{- if .Values.tenx.apiKey }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "logstash.fullname" . }}-tenx-git-token
  labels:
    app: {{ template "logstash.fullname" . }}
    chart: {{ .Chart.Name | quote }}
    heritage: {{ .Release.Service | quote }}
    release: {{ .Release.Name | quote }}
type: Opaque
data:
  token: {{ .Values.tenx.gitToken | b64enc | quote }}
{{- end }}
